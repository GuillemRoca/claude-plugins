name: Validate Marketplace

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate marketplace manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace manifest
        run: claude plugin validate .

  test-install:
    name: Test marketplace install
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git to use HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Add marketplace from checkout
        run: claude plugin marketplace add ./

      - name: List marketplaces
        run: claude plugin marketplace list

      - name: Install agent-skills-android from marketplace
        run: claude plugin install agent-skills-android@guillemroca --scope user
